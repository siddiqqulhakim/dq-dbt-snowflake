source:
  type: dbt
  config:
    manifest_path: "target/manifest.json"
    catalog_path: "target/catalog.json"
    run_results_paths:
      - "target/run_results.json"
    target_platform: snowflake

    write_semantics: OVERRIDE

    enable_meta_mapping: true
    enable_query_tag_mapping: false
    enable_owner_extraction: true

    strip_user_ids_from_email: false

    entities_enabled:
      models: Yes
      sources: Yes
      seeds: Yes
      snapshots: Yes
      test_definitions: Yes
      test_results: Yes

    node_name_pattern:
      deny: []
      allow:
        - ".*"

    meta_mapping:
      layer:
        match: ".*"
        operation: "add_tag"
        config:
          tag: "dbt:layer:{{ $match }}"
      domain:
        match: ".*"
        operation: "add_tag"
        config:
          tag: "dbt:domain:{{ $match }}"

    tag_prefix: "dbt:"

    infer_dbt_schemas: true

    include_column_lineage: true

    include_env_in_assertion_guid: false

