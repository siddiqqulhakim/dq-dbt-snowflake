version: 2

models:
  - name: GLD__FINANCE__SUMMARY
    description: "Monthly aggregated Finance financial summary by region, country, and status."
    config:
      materialized: table
      tags: ["gold", "finance", "summary"]
    tests:
      - expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: region
        description: "Region of the transactions."
        tests:
          - not_null
          - expect_column_values_to_not_be_null
      - name: country
        description: "Country of the transactions."
      - name: status
        description: "Transaction status group."
      - name: transaction_month
        description: "Month bucket (date_trunc to month)."
      - name: transaction_count
        description: "Number of transactions in the period."
        tests:
          - expect_column_values_to_be_between:
              min_value: 1
      - name: total_amount
        description: "Sum of transaction amounts."
        tests:
          - expect_column_values_to_be_between:
              min_value: 0
      - name: total_cost
        description: "Sum of transaction costs."
      - name: total_revenue
        description: "Sum of revenues generated."
        tests:
          - expect_column_values_to_be_between:
              min_value: 0
      - name: avg_amount
        description: "Average transaction amount."
