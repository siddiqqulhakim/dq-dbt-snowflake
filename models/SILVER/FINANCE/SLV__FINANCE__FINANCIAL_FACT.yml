version: 2

models:
  - name: SLV__FINANCE__FINANCIAL_FACT
    description: "Cleaned and typed Finance financial fact. Null fact_ids excluded."
    config:
      materialized: table
      tags: ["silver", "finance", "financial"]
    tests:
      - expect_table_row_count_to_be_between:
          min_value: 1
    columns:
      - name: fact_id
        description: "Primary key of the financial fact record."
        tests:
          - not_null
          - unique
          - expect_column_values_to_not_be_null
      - name: entity_id
        description: "Foreign key to the Finance entity dimension."
        tests:
          - not_null
          - expect_column_values_to_not_be_null
      - name: transaction_ts
        description: "Timestamp of the financial transaction."
        tests:
          - not_null
          - expect_column_values_to_not_be_null
      - name: status
        description: "Status of the transaction."
      - name: region
        description: "Region of the transaction."
      - name: country
        description: "Country of the transaction."
      - name: amount
        description: "Financial amount (typed to NUMERIC(18,2))."
        tests:
          - expect_column_values_to_be_between:
              min_value: 0
      - name: cost
        description: "Transaction cost (typed to NUMERIC(18,2))."
        tests:
          - expect_column_values_to_be_between:
              min_value: 0
      - name: revenue
        description: "Revenue generated (typed to NUMERIC(18,2))."
        tests:
          - expect_column_values_to_be_between:
              min_value: 0
