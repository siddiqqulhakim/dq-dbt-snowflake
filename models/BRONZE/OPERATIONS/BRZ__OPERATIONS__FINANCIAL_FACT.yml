version: 2

models:
  - name: BRZ__OPERATIONS__FINANCIAL_FACT
    description: "Raw ingest of the Operations financial fact table from DEMO_ENTERPRISE_DB.OPERATIONS."
    config:
      materialized: view
      tags: ["bronze", "operations", "financial"]
    columns:
      - name: fact_id
        description: "Primary key of the financial fact record."
      - name: entity_id
        description: "Foreign key to the entity dimension."
      - name: account_number
        description: "Account number (Sensitive — masked for non-privileged roles)."
        masking_policy: MASK_ACCOUNT_NUMBER
      - name: transaction_ts
        description: "Timestamp of the financial transaction."
      - name: status
        description: "Status of the transaction."
      - name: region
        description: "Region of the transaction."
      - name: country
        description: "Country of the transaction."
      - name: amount
        description: "Financial transaction amount."
      - name: cost
        description: "Cost associated with the transaction."
      - name: revenue
        description: "Revenue generated by the transaction."
